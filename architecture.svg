<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="700" viewBox="0 0 1260 700" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#33506b"/>
    </marker>
    <marker id="arrowP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B69D6"/>
    </marker>
    <marker id="arrowE" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1B72E8"/>
    </marker>
  </defs>

  <!-- Title -->
  <rect x="0" y="0" width="1260" height="48" fill="#0078D4"/>
  <text x="630" y="30" fill="#ffffff" font-size="17" font-weight="bold" text-anchor="middle">Azure SRE Agent + Managed Grafana — public endpoint secured by Entra ID + RBAC</text>

  <!-- Subscription -->
  <rect x="20" y="64" width="840" height="448" rx="10" fill="none" stroke="#9CC4E4" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="34" y="84" fill="#5b7795" font-size="12" font-weight="bold">Azure Subscription</text>

  <!-- Resource group -->
  <rect x="40" y="100" width="800" height="392" rx="10" fill="#FAFCFE" stroke="#0078D4" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="54" y="120" fill="#0078D4" font-size="12" font-weight="bold">Resource Group — rg-&lt;env&gt;-sre</text>

  <!-- Managed Identity -->
  <rect x="70" y="150" width="300" height="92" rx="8" fill="#EEEEFB" stroke="#6B69D6" stroke-width="2"/>
  <text x="220" y="190" fill="#3c3a96" font-size="13" font-weight="bold" text-anchor="middle">Managed Identity</text>
  <text x="220" y="210" fill="#3c3a96" font-size="12" text-anchor="middle">agent workload identity</text>

  <!-- SRE Agent -->
  <rect x="70" y="300" width="300" height="120" rx="8" fill="#0078D4" stroke="#0078D4" stroke-width="2"/>
  <text x="220" y="345" fill="#ffffff" font-size="13" font-weight="bold" text-anchor="middle">Azure SRE Agent</text>
  <text x="220" y="366" fill="#ffffff" font-size="12" text-anchor="middle">AI incident investigation</text>
  <text x="220" y="386" fill="#cfe4fb" font-size="11" text-anchor="middle">Microsoft-managed (no VNet injection)</text>

  <!-- Managed Grafana -->
  <rect x="510" y="300" width="280" height="120" rx="8" fill="#FFF1E6" stroke="#F46800" stroke-width="2"/>
  <text x="650" y="345" fill="#8a3b00" font-size="13" font-weight="bold" text-anchor="middle">Azure Managed Grafana</text>
  <text x="650" y="366" fill="#8a3b00" font-size="12" text-anchor="middle">public endpoint · Entra ID + RBAC</text>
  <text x="650" y="386" fill="#8a3b00" font-size="12" text-anchor="middle">/api/azure-mcp</text>

  <!-- Entra ID auth boundary -->
  <rect x="470" y="540" width="320" height="110" rx="8" fill="#EAF1FB" stroke="#1B72E8" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="630" y="575" fill="#0b3d91" font-size="12" font-weight="bold" text-anchor="middle">Microsoft Entra ID</text>
  <text x="630" y="596" fill="#0b3d91" font-size="12" text-anchor="middle">authentication boundary</text>
  <text x="630" y="616" fill="#0b3d91" font-size="11" text-anchor="middle">no API keys · no anonymous access</text>

  <!-- Customer data sources -->
  <rect x="910" y="120" width="330" height="392" rx="10" fill="#F3F7FB" stroke="#9CC4E4" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="1075" y="142" fill="#5b7795" font-size="12" font-weight="bold" text-anchor="middle">Customer-provided data sources</text>
  <text x="1075" y="160" fill="#5b7795" font-size="11" text-anchor="middle">bring your own · restored from backup</text>

  <rect x="940" y="186" width="270" height="70" rx="8" fill="#FDEAE3" stroke="#E6522C" stroke-width="2"/>
  <text x="1075" y="227" fill="#7a2b15" font-size="13" font-weight="bold" text-anchor="middle">Prometheus — metrics</text>

  <rect x="940" y="290" width="270" height="70" rx="8" fill="#FFF6E0" stroke="#FEBE2E" stroke-width="2"/>
  <text x="1075" y="331" fill="#7a5a00" font-size="13" font-weight="bold" text-anchor="middle">Loki — logs</text>

  <rect x="940" y="394" width="270" height="70" rx="8" fill="#ECE6FA" stroke="#5C36C6" stroke-width="2"/>
  <text x="1075" y="435" fill="#3c2585" font-size="13" font-weight="bold" text-anchor="middle">Tempo — traces</text>

  <!-- Edges -->
  <!-- MI -> Agent (identity) -->
  <line x1="220" y1="242" x2="220" y2="300" stroke="#6B69D6" stroke-width="2" marker-end="url(#arrowP)"/>
  <text x="232" y="276" fill="#6B69D6" font-size="11" font-weight="bold">identity</text>

  <!-- MI -> Grafana (Grafana Viewer RBAC) -->
  <path d="M370,210 C 440,210 470,330 510,340" fill="none" stroke="#8a7fd6" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrowP)"/>
  <text x="392" y="262" fill="#6B69D6" font-size="10" font-weight="bold">Grafana Viewer (RBAC)</text>

  <!-- Agent -> Grafana (MCP) -->
  <line x1="370" y1="360" x2="510" y2="360" stroke="#33506b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="440" y="345" fill="#33506b" font-size="11" font-weight="bold" text-anchor="middle">MCP over HTTPS</text>
  <text x="440" y="380" fill="#33506b" font-size="10" text-anchor="middle">(Entra-authenticated)</text>

  <!-- Entra -> Grafana (token issued by) -->
  <line x1="640" y1="540" x2="655" y2="420" stroke="#1B72E8" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrowE)"/>
  <text x="672" y="486" fill="#1B72E8" font-size="10" font-weight="bold">token issued by</text>

  <!-- Grafana -> data sources -->
  <path d="M790,338 C 860,338 880,221 940,221" fill="none" stroke="#33506b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="852" y="300" fill="#33506b" font-size="11" font-weight="bold" text-anchor="middle">query</text>
  <line x1="790" y1="360" x2="940" y2="325" stroke="#33506b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M790,382 C 860,382 880,429 940,429" fill="none" stroke="#33506b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Footnote -->
  <text x="40" y="678" fill="#7a93ab" font-size="11">No VNet or private endpoint: the Microsoft-managed SRE Agent has no VNet injection, so it reaches Grafana over the public, Entra-protected endpoint. A private endpoint would block the agent.</text>
</svg>
