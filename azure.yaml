# Azure SRE Agent + Managed Grafana sandbox — azd project

name: azure-sre-agent-grafana
metadata:
  template: azure-sre-agent-grafana@1.0.0

infra:
  provider: bicep
  path: infra
  module: main

# Region preflight runs before provisioning; the access summary runs after.
hooks:
  preprovision:
    posix:
      shell: sh
      continueOnError: false
      run: scripts/preflight-region.sh "$AZURE_LOCATION"
    windows:
      shell: pwsh
      continueOnError: false
      run: ./scripts/preflight-region.ps1 -Location $env:AZURE_LOCATION
  postprovision:
    posix:
      shell: sh
      continueOnError: true
      run: scripts/show-access.sh
    windows:
      shell: pwsh
      continueOnError: true
      run: ./scripts/show-access.ps1
